name: Build Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Clone common kernel
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/kernel/common \
            -b android15-6.6-lts \
            common

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev \
            python3 python3-pip git curl zip unzip clang llvm lld \
            binutils-aarch64-linux-gnu

      - name: Apply YukiSU
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/Anatdx/YukiSU/main/kernel/setup.sh" \
            | bash -s main

       - name: Configure kernel
        run: |
          cd common
          echo "CONFIG_KSU=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> arch/arm64/configs/gki_defconfig
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> arch/arm64/configs/gki_defconfig

      - name: Apply SUSFS
        run: |
          git clone --depth=1 \
            https://gitlab.com/simonpunk/susfs4ksu.git \
            -b gki-android15-6.6 \
            ../susfs4ksu

          echo "=== Listing patch files ==="
          ls ../susfs4ksu/kernel_patches/

          PATCH=$(find ../susfs4ksu/kernel_patches/ -name "50_add_susfs*.patch" | head -1)
          echo "Found patch: $PATCH"

          cp ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch \
            common/KernelSU/
          cp "$PATCH" common/
          cp ../susfs4ksu/kernel_patches/fs/* common/fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* common/include/linux/

          cd common/KernelSU
          patch -p1 < 10_enable_susfs_for_ksu.patch || true

          cd ../
          patch -p1 < $(basename "$PATCH") || true
          
      - name: Build kernel
        run: |
          cd common
          make ARCH=arm64 CC=clang LLVM=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            O=out gki_defconfig
          make ARCH=arm64 CC=clang LLVM=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            O=out -j$(nproc)

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 \
            https://github.com/osm0sis/AnyKernel3 \
            AnyKernel3
          cp bazel-bin/common/kernel_aarch64/Image AnyKernel3/
          cd AnyKernel3
          zip -r9 ../kernel-onyx.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-onyx
          path: kernel-onyx.zip
          retention-days: 7
