name: Build Kernel

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Clone common kernel
        run: |
          git clone --depth=1 \
            https://android.googlesource.com/kernel/common \
            -b android15-6.6-lts \
            common

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev libelf-dev \
            python3 python3-pip git curl zip unzip clang llvm lld \
            binutils-aarch64-linux-gnu

      - name: Apply SukiSU
        run: |
          cd common
          curl -LSs "https://raw.githubusercontent.com/ShirkNeko/SukiSU-Ultra/main/su.sh" | bash -s susfs-main

      - name: Configure kernel
        run: |
          cd common
          make ARCH=arm64 CC=clang LLVM=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            O=out gki_defconfig
          
          # Append configs to the generated .config
          echo "CONFIG_KSU=y" >> out/.config
          echo "CONFIG_KSU_SUSFS=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SUS_OVERLAYFS=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> out/.config
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> out/.config
          
          # Resolve config dependencies
          make ARCH=arm64 CC=clang LLVM=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            O=out olddefconfig

      - name: Build kernel
        run: |
          cd common
          make ARCH=arm64 CC=clang LLVM=1 \
            CROSS_COMPILE=aarch64-linux-gnu- \
            O=out -j$(nproc)

      - name: Package with AnyKernel3
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git AnyKernel3
          
          # Copying the raw Image (standard for GKI architectures)
          # If your branch builds compressed images, swap 'Image' to 'Image.gz' below
          cp common/out/arch/arm64/boot/Image.gz AnyKernel3/
          
          # Compress the directory into the flashable zip expected by the upload step
          cd AnyKernel3
          zip -r9 ../kernel-onyx.zip * -x .git* README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-onyx
          path: kernel-onyx.zip
          retention-days: 7
